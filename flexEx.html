<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 사용 예제</title>
    <style>
        header{
            height: 80px;
            text-align: center;
        }
        section{
            width: 1200px;
            margin: 0 auto;
            /* 주로 부모에게 display: flex를 주면 자동으로 나란히 배치 */
            /* float: left;는 더 이상 필요가 없다 */
            display: flex;
            /* 주축 방향의 정령 담당 */
            justify-content: center;
            gap: 20px;
        }
        .div{
            width: 300px;
            text-align: center;
            border: 1px solid lightgray;
            border-radius: 10px;
            height: 100px;
        }
        .div a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <div class="all">
        <header>
            <h1>이지항의 홈페이지</h1>
        </header>
        <section>
            <div class="div">
                <h3>테슬라 홈페이지</h3>
                <a href="https://www.tesla.com/ko_kr">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>르세라핌 공식 홈페이지</h3>
                <a href="https://www.sourcemusic.com/artist/profile/LE%20SSERAFIM">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>유튜브</h3>
                <a href="https://www.youtube.com/?app=desktop&hl=ko&gl=KR">클릭하세요~</a>
            </div>
        </section>
    </div>
</body>
</html>
